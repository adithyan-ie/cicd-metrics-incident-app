services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: incident_management
      POSTGRES_USER: incident
      POSTGRES_PASSWORD: incident
    volumes:
      - incident_postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  backend:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://incident:incident@postgres:5432/incident_management
      KAFKA_BOOTSTRAP_SERVERS: host.docker.internal:9092
      SECRET_KEY: change-me
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:5000

volumes:
  incident_postgres_data:
